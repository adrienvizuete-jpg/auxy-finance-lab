name: Daily Market Intelligence

on:
  schedule:
    # Double cron pour gérer le changement d'heure été/hiver
    # 4h30 UTC = 6h30 CEST (été) — le script skip en hiver
    # 5h30 UTC = 6h30 CET (hiver) — le script skip en été
    - cron: '30 4 * * 1-5'
    - cron: '30 5 * * 1-5'
  workflow_dispatch:
    inputs:
      force:
        description: 'Forcer l envoi (ignorer check jour ouvré / cron)'
        type: boolean
        default: true

concurrency:
  group: veille-daily
  cancel-in-progress: false

jobs:
  veille:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: veille/pyproject.toml

      - name: Install dependencies
        run: pip install yfinance httpx python-dotenv feedparser

      - name: Run veille
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          BDF_API_KEY: ${{ secrets.BDF_API_KEY }}
          PYTHONPATH: ${{ github.workspace }}
          CRON_SCHEDULE: ${{ github.event.schedule }}
        run: |
          if [ "${{ inputs.force }}" = "true" ]; then
            python -m veille.main run --force
          else
            python -m veille.main run
          fi

      - name: Notify on failure
        if: failure()
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          python -c "
          import smtplib
          from email.mime.text import MIMEText
          import os
          msg = MIMEText('La veille quotidienne a echoue. Verifier les logs : https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}')
          msg['Subject'] = '[ALERTE] Veille Auxy - Echec'
          msg['From'] = os.environ['GMAIL_USER']
          msg['To'] = 'adrien.vizuete@auxy-partners.com'
          with smtplib.SMTP_SSL('smtp.gmail.com', 465) as s:
              s.login(os.environ['GMAIL_USER'], os.environ['GMAIL_APP_PASSWORD'])
              s.send_message(msg)
          "
