name: Daily Market Intelligence

on:
  schedule:
    # Double cron pour gérer le changement d'heure été/hiver
    # 4h30 UTC = 6h30 CEST (été) — le script skip en hiver
    # 5h30 UTC = 6h30 CET (hiver) — le script skip en été
    - cron: '30 4 * * 1-5'
    - cron: '30 5 * * 1-5'
  workflow_dispatch:
    inputs:
      force:
        description: 'Forcer l envoi (ignorer check jour ouvré / cron)'
        type: boolean
        default: true

jobs:
  veille:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: veille/pyproject.toml

      - name: Install dependencies
        run: pip install yfinance httpx python-dotenv

      - name: Run veille
        env:
          GNEWS_API_KEY: ${{ secrets.GNEWS_API_KEY_VEILLE }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          PYTHONPATH: ${{ github.workspace }}
        run: |
          if [ "${{ inputs.force }}" = "true" ]; then
            python -m veille.main run --force
          else
            python -m veille.main run
          fi
