<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

<body>

            <nav class="sidebar-nav">

                    <span>Dashboard</span>
                </a>
                <a href="#credit" class="nav-item" data-page="credit">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>
                    <span>Simulation Cr&eacute;dit</span>
                </a>
                <a href="#structured" class="nav-item" data-page="structured">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18"/><path d="M7 16l4-8 4 5 5-9"/></svg>
                    <span>Financement Structur&eacute;</span>
                </a>
                <a href="#benchmark" class="nav-item" data-page="benchmark">

                    <span>Benchmark</span>
                </a>
                <a href="#immobilier" class="nav-item" data-page="immobilier">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 21h18M5 21V7l7-4 7 4v14M9 21v-6h6v6"/></svg>
                    <span>Immobilier</span>
                </a>
                <div class="nav-separator"></div>

                <a href="#stress" class="nav-item" data-page="stress">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>

            </nav>
            <div class="sidebar-footer">
                <button id="toggle-theme" class="theme-toggle" title="Changer de th&egrave;me">

                <span class="version-label">v1.0.0</span>

        <!-- Mobile header -->
        <header id="mobile-header" class="mobile-header">
            <button id="menu-toggle" class="menu-toggle">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
            </button>
            <span class="mobile-title">Auxy Partners</span>
        </header>

        <!-- Main content -->
        <main id="main-content" class="main-content">
            <div id="page-container" class="page-container">
                <!-- Content injected by JavaScript modules -->
            </div>
        </main>
    </div>

    <!-- Toast notifications -->
    <div id="toast-container" class="toast-container"></div>

    <!-- Modal -->
    <div id="modal-overlay" class="modal-overlay hidden">
        <div id="modal-content" class="modal-content">
            <button class="modal-close" id="modal-close">&times;</button>
            <div id="modal-body"></div>
        </div>
    </div>

    <!-- Scripts -->
    <script type="module" src="js/app.js"></script>
</body>
</html>
